<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | QueueSmart</title>

    <link rel="stylesheet" href="../../css/global.css?v=2">
    <link rel="stylesheet" href="../../css/nav.css?v=3">
</head>
<body>
    <div class="app-layout">

        <div id="nav-container"></div>

        <main class="app-main">
            <h1 id="dashboardGreeting" style="margin-bottom: var(--space-6);">Welcome back</h1>

            <section class="card" style="margin-bottom: var(--space-6);">
                <h2 style="margin-bottom: var(--space-4);">Your Current Status</h2>
                <div id="userStatusSummary">
                    <p>Checking your position in line...</p>
                </div>
            </section>

            <section class="card" style="margin-bottom: var(--space-6);">
                <h2 style="margin-bottom: var(--space-4);">Active Services Available</h2>
                <div id="activeServicesList" style="display: flex; flex-direction: column; gap: var(--space-4);">
                    <p>Loading active services...</p>
                </div>
            </section>

            <section class="card">
                <h2 style="margin-bottom: var(--space-4);">Notifications Summary</h2>
                <ul id="notificationsList" style="list-style: none; padding-left: 0; display: flex; flex-direction: column; gap: var(--space-3);">
                    <li style="padding: var(--space-3); background: var(--gray-100); border-radius: var(--radius-md);">
                        Welcome back! Join a queue to see updates here.
                    </li>
                </ul>
            </section>

        </main>
    </div>

    <script src="../../js/notifications.js"></script>
    <script src="../../js/router.js"></script>
    <script src="../../js/nav.js?v=4"></script>
    
    <script src="../../js/user.js"></script> 
</body>
</html>
